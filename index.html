<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Growth Accelerator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>

  <!-- NAV / LOGO -->
  <header class="header">
    <div class="container">
      <div class="logo">
        <img src="/src/logo.png" alt="Logo" style="width:40px;height:auto;" />
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-inner">
      <h1 class="hero-title">
        Turn inconsistent sales <br />
        <span class="hero-highlight">into predictable $1K+ days</span>
      </h1>
    </div>
  </section>

  <!-- CALENDLY EMBED -->
  <section class="calendly-section" id="calendly">
    <div class="container">
      <div
        class="calendly-inline-widget"
        data-url="https://calendly.com/axisdigital-info/1-1-strategy-session"
        style="min-width:320px;height:700px;"
      ></div>
      <script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>
    </div>
  </section>

  <!-- TESTIMONIALS -->
  <section class="testimonials-section">
    <div class="container">
      <h2 class="testimonials-title">Client Results</h2>
      <div class="testimonials-grid">
        <div class="testimonial-card">
          <p class="testimonial-label">Matthias went from 16k to 60k pounds.</p>
          <div class="video-wrapper">
            <iframe
              src="https://www.youtube.com/embed/k5XY5Rwts-A"
              title="Matthias went from 16k to 60k pounds"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
        </div>
        <div class="testimonial-card">
          <p class="testimonial-label">Maurice went from £1K/month to £36K/month in just 40 days.</p>
          <div class="video-wrapper">
            <iframe
              src="https://www.youtube.com/embed/c4VGgJn-e1g"
              title="Maurice went from £1K/month to £36K/month in just 40 days"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen
            ></iframe>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Growth Accelerator</p>
    </div>
  </footer>

</body>
</html>
